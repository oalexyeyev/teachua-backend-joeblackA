name: Full CI/CD Pipeline

on:
  push:
    branches:
      - feature/terraform-aws-without-nat
  workflow_dispatch:

jobs:
  build:
    name: Build Application (JDK 17 + Maven 3.6.3)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Maven 3.6.3
        run: |
          MAVEN_VERSION=3.6.3
          wget https://archive.apache.org/dist/maven/maven-3/$MAVEN_VERSION/binaries/apache-maven-$MAVEN_VERSION-bin.tar.gz
          tar xzf apache-maven-$MAVEN_VERSION-bin.tar.gz
          sudo mv apache-maven-$MAVEN_VERSION /opt/maven
          echo "/opt/maven/bin" >> $GITHUB_PATH

      - name: Verify Maven version
        run: mvn -version

      - name: Build with Maven
        run: mvn clean package

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/dev.war

  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install AWS CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y awscli
          aws --version

      - name: Verify AWS CLI Auth
        run: aws sts get-caller-identity

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

  ansible:
    name: Configure with Ansible
    runs-on: ubuntu-latest
    needs: terraform
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Demo Playbook
        run: |
          echo "---" > demo-playbook.yml
          echo "- hosts: localhost" >> demo-playbook.yml
          echo "  tasks:" >> demo-playbook.yml
          echo "    - name: Demo configuration" >> demo-playbook.yml
          echo "      debug:" >> demo-playbook.yml
          echo "        msg: 'Ansible configuration completed successfully (demo mode)'" >> demo-playbook.yml
          ansible-playbook demo-playbook.yml

  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: ansible
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: ./deploy

      - name: Deploy App (Demo)
        run: |
          echo "🚀 Deploying $(ls ./deploy)"
          # Replace below with your real deploy commands, e.g. scp and service restart
          echo "✅ Application deployed successfully!"
