name: terra part
on:
  push:
    branches:
      - feature/terraform-aws-without-nat
  workflow_dispatch:
jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
   # needs: build
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install AWS CLI v2
        run: |
         aws --version
      - name: Verify AWS CLI Auth
        run: aws sts get-caller-identity

      - name: Configure AWS to assume role
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::135424146100:role/TerraformExecutionRole
          role-session-name: github-actions
          role-skip-session-tagging: true
          role-duration-seconds: 900   
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Verify AWS CLI Auth
        run: aws sts get-caller-identity    

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
    

      - name: Terraform Init
        run: |
          cd terraform-teachua
          terraform init \
            -backend-config="profile=" \
            -backend-config="bucket=teachua-terraform1" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=us-east-1"
      - name: Terraform Plan
        run: |
          cd terraform-teachua
          terraform plan  -var="key_pair_name=${{ secrets.KEY_PAIR_NAME }}" - -var="assume_role=false"

      - name: Terraform Apply
        run: |
          cd terraform-teachua
          terraform apply -auto-approve -var="key_pair_name=${{ secrets.KEY_PAIR_NAME }}" -var="assume_role=false"
        continue-on-error: true


