---
- name: Встановити MariaDB клієнт
  become: true
  ansible.builtin.yum:
    name: mariadb1011
    state: present

- name: Встановити OpenJDK 17
  become: true
  ansible.builtin.yum:
    name: java-17-amazon-corretto-devel
    state: present

- name: Install python3 and pip on Amazon Linux 2023
  become: yes
  package:
    name:
      - python3
      - python3-pip
    state: present

- name: Install PyMySQL with pip3
  become: yes
  pip:
    name: PyMySQL
    executable: pip3
