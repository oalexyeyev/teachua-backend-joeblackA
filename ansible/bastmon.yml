---
- name: Setup Monitoring on Bastion
  hosts: bastion
  become: yes
  vars:
    node_exporter_port: 9100
    prometheus_port: 9090
    grafana_port: 3000
    backendip: "{{ backend_ip }}"
    bastionip: "{{ ansible_host }}"
    grafana_admin_user: admin
    grafana_admin_password: admin

  tasks:

    - name: Create setup script for monitoring
      copy:
        dest: /home/ec2-user/setup_monitoring.sh
        mode: '0755'
        content: |

          #!/bin/bash
          # Install Docker
          # Update packages
          sudo yum update -y

          # Install Docker
          sudo amazon-linux-extras enable docker
          sudo yum install -y docker

          # Start Docker service
          sudo systemctl start docker
          sudo systemctl enable docker

          # Add ec2-user to docker group (so no sudo is needed)
          sudo usermod -aG docker ec2-user


          # Install Docker Compose
          curl -L "https://github.com/docker/compose/releases/download/v2.29.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          chmod +x /usr/local/bin/docker-compose

          # Create directories for Grafana and Prometheus
          mkdir -p /home/ec2-user/grafana/provisioning/datasources
          mkdir -p /home/ec2-user/grafana/provisioning/dashboards
          mkdir -p /home/ec2-user/grafana/dashboards

          # Create Prometheus config
          cat > /home/ec2-user/prometheus.yml << EOF
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'bastion-node'
              static_configs:
                - targets: ['{{ bastionip }}:{{ node_exporter_port }}']
            - job_name: 'backend-node'
              static_configs:
                - targets: ['{{ backendip }}:{{ node_exporter_port }}']
          EOF

          # Create Grafana datasource provisioning
          cat > /home/ec2-user/grafana/provisioning/datasources/datasource.yml << EOF
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              access: proxy
              url: http://prometheus:{{ prometheus_port }}
              isDefault: true
          EOF

          # Create Grafana dashboard provisioning
          cat > /home/ec2-user/grafana/provisioning/dashboards/dashboard.yml << EOF
          apiVersion: 1
          providers:
            - name: 'Node Exporter'
              orgId: 1
              folder: ''
              type: file
              options:
                path: /var/lib/grafana/dashboards
          EOF

          # Download Node Exporter dashboard
          curl -L "https://grafana.com/api/dashboards/1860/revisions/41/download" -o /home/ec2-user/grafana/dashboards/node_exporter_full.json

          # Create Docker Compose file
          cat > /home/ec2-user/docker-compose.monitoring.yml << EOF
          version: "3.8"
          services:
            node-exporter:
              image: prom/node-exporter:latest
              container_name: node-exporter
              restart: unless-stopped
              network_mode: "host"
              pid: "host"
              volumes:
                - /:/host:ro,rslave
              command:
                - '--path.rootfs=/host'
              ports:
                - "\${NODE_EXPORTER_PORT:-{{ node_exporter_port }}}:9100"

            prometheus:
              image: prom/prometheus:latest
              container_name: prometheus
              restart: unless-stopped
              ports:
                - "\${PROMETHEUS_PORT:-{{ prometheus_port }}}:9090"
              volumes:
                - /home/ec2-user/prometheus.yml:/etc/prometheus/prometheus.yml

            grafana:
              image: grafana/grafana:latest
              container_name: grafana
              restart: unless-stopped
              ports:
                - "\${GRAFANA_PORT:-{{ grafana_port }}}:3000"
              volumes:
                - /home/ec2-user/grafana/provisioning:/etc/grafana/provisioning
                - /home/ec2-user/grafana/dashboards:/var/lib/grafana/dashboards
              environment:
                GF_SECURITY_ADMIN_USER: {{ grafana_admin_user }}
                GF_SECURITY_ADMIN_PASSWORD: {{ grafana_admin_password }}
                GF_USERS_ALLOW_SIGN_UP: "false"
          EOF

          # Run Docker Compose stack
          NODE_EXPORTER_PORT={{ node_exporter_port }} PROMETHEUS_PORT={{ prometheus_port }} GRAFANA_PORT={{ grafana_port }} /usr/local/bin/docker-compose -f /home/ec2-user/docker-compose.monitoring.yml up -d

    - name: Run the monitoring setup script
      shell: /home/ec2-user/setup_monitoring.sh
      args:
        executable: /bin/bash
