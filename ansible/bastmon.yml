---
- name: Setup Monitoring on Bastion
  hosts: bastion
  become: yes
  vars:
    node_exporter_port: 9100
    prometheus_port: 9090
    grafana_port: 3000
    backendip: "{{ backend_ip }}"
    bastionip: "{{ ansible_host }}"
    grafana_admin_user: admin
    grafana_admin_password: admin

  tasks:
    - name: Install Docker
      shell: |
        yum update -y
        amazon-linux-extras enable docker
        yum install -y docker
        systemctl start docker
        systemctl enable docker
        usermod -aG docker ec2-user
      args:
        executable: /bin/bash

    - name: Install Docker Compose
      get_url:
        url: "https://github.com/docker/compose/releases/download/v2.29.2/docker-compose-$(uname -s)-$(uname -m)"
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    - name: Create directories for Grafana and Prometheus
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /home/ec2-user/grafana/provisioning/datasources
        - /home/ec2-user/grafana/provisioning/dashboards
        - /home/ec2-user/grafana/dashboards

    - name: Create Prometheus config
      copy:
        dest: /home/ec2-user/prometheus.yml
        content: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'bastion-node'
              static_configs:
                - targets: ['{{ bastionip }}:{{ node_exporter_port }}']
            - job_name: 'backend-node'
              static_configs:
                - targets: ['{{ backendip }}:{{ node_exporter_port }}']

    - name: Create Grafana datasource provisioning
      copy:
        dest: /home/ec2-user/grafana/provisioning/datasources/datasource.yml
        content: |
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              access: proxy
              url: http://prometheus:{{ prometheus_port }}
              isDefault: true

    - name: Create Grafana dashboard provisioning
      copy:
        dest: /home/ec2-user/grafana/provisioning/dashboards/dashboard.yml
        content: |
          apiVersion: 1
          providers:
            - name: 'Node Exporter'
              orgId: 1
              folder: ''
              type: file
              options:
                path: /var/lib/grafana/dashboards

    - name: Download Node Exporter Full dashboard JSON (ID 1860)
      get_url:
        url: "https://grafana.com/api/dashboards/1860/revisions/1/download"
        dest: /home/ec2-user/grafana/dashboards/node_exporter_full.json

    - name: Fix datasource UID in Node Exporter dashboard
      replace:
        path: /home/ec2-user/grafana/dashboards/node_exporter_full.json
        regexp: '"uid": "\\$\\{DS_LOCALHOST\\}"'
        replace: '"Prometheus"'

    - name: Create docker-compose file for monitoring stack
      copy:
        dest: /home/ec2-user/docker-compose.monitoring.yml
        content: |
          version: "3.8"
          services:
            node-exporter:
              image: prom/node-exporter:latest
              container_name: node-exporter
              restart: unless-stopped
              network_mode: "host"
              pid: "host"
              volumes:
                - /:/host:ro,rslave
              command:
                - '--path.rootfs=/host'
              ports:
                - "${NODE_EXPORTER_PORT:-{{ node_exporter_port }}}:9100"

            prometheus:
              image: prom/prometheus:latest
              container_name: prometheus
              restart: unless-stopped
              ports:
                - "${PROMETHEUS_PORT:-{{ prometheus_port }}}:9090"
              volumes:
                - /home/ec2-user/prometheus.yml:/etc/prometheus/prometheus.yml

            grafana:
              image: grafana/grafana:latest
              container_name: grafana
              restart: unless-stopped
              ports:
                - "${GRAFANA_PORT:-{{ grafana_port }}}:3000"
              volumes:
                - /home/ec2-user/grafana/provisioning:/etc/grafana/provisioning
                - /home/ec2-user/grafana/dashboards:/var/lib/grafana/dashboards
              environment:
                GF_SECURITY_ADMIN_USER: {{ grafana_admin_user }}
                GF_SECURITY_ADMIN_PASSWORD: {{ grafana_admin_password }}
                GF_USERS_ALLOW_SIGN_UP: "false"

    - name: Run monitoring stack
      shell: NODE_EXPORTER_PORT={{ node_exporter_port }} PROMETHEUS_PORT={{ prometheus_port }} GRAFANA_PORT={{ grafana_port }} /usr/local/bin/docker-compose -f /home/ec2-user/docker-compose.monitoring.yml up -d
      args:
        executable: /bin/bash
